name: firebase-hosting-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality gates (typecheck + lint + build)
        run: npm run check
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_AURIXA_STREAM_MODE: auto
          VITE_AURIXA_WS_URL: ${{ secrets.VITE_AURIXA_WS_URL }}
          VITE_AURIXA_POLL_URL: ${{ secrets.VITE_AURIXA_POLL_URL }}
          VITE_AURIXA_POLL_INTERVAL_MS: '2000'
          VITE_AURIXA_WS_RECONNECT_MS: '2000'
          VITE_AURIXA_SIMULATION_INTERVAL_MS: '2200'

      - name: Validate Firebase deploy secret
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_AURIXA_46CC7 }}" ]; then
            echo "Missing required secret: FIREBASE_SERVICE_ACCOUNT_AURIXA_46CC7"
            echo "Set it at Repository -> Settings -> Secrets and variables -> Actions"
            exit 1
          fi

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AURIXA_46CC7 }}
          projectId: aurixa-46cc7
          channelId: live
